# PPG Hyperparameters
ppg:
  entropy_coef: 0.005
  vf_loss_coef: 0.25
  batchsize: 256
  ppo_epochs: 10
  n_update: 2048
  gamma: 0.99
  lam: 0.95
  lr: 0.0003
  use_history: "auto"
  
  # PPG specific
  lr_policy: 0.0003
  lr_value: 0.001
  n_aux: 5
  k_aux: 10
  beta_kl: 5.0
  d_targ: 0.03
  clip_val: 10.0
  clip_eps: 0.2


# Backbone Hyperparameters (Mamba)
backbone:
  d_model: 128
  seq_len: 5
  dropout: 0.1
  d_state: 16
  d_conv: 4
  n_layers: 2

# Training Control
training:
  n_episode: 5000
  n_saved: 100
  render: "false"
  seed: 55

# Adaptive Reward (mặc định TẮT — chạy baseline reward gốc)
adaptive_reward:
  lagrangian_enabled: false
  lambda_safety_init: 1.0
  lambda_comfort_init: 0.1
  lambda_redlight_init: 25.0
  lambda_lr: 0.01
  cost_limit_safety: 0.02
  cost_limit_comfort: 0.30
  cost_limit_redlight: 0.0
  lambda_max: 50.0
  curriculum_enabled: false
  curriculum_warmup: 1000
  curriculum_energy_w_start: 0.0
  curriculum_energy_w_end: 0.01197655138923567
